# Expert layer — scheduled currency refresh (STARTER / opt-in)
#
# Decouples a domain's currency from any learner: the UPSTREAM repo periodically has an AI refresh
# each domain's field-pulse.md and opens a PR for a maintainer to review. No hosted platform — just
# CI. Disabled by default (manual trigger). To enable for real:
#   1. Add a repo secret with your model API key (e.g. ANTHROPIC_API_KEY).
#   2. Wire up the "Refresh" step to actually call your model (see the comment in that step).
#   3. Uncomment the `schedule` trigger.
#
# This is intentionally a template: it shows the mechanism. The AI call is left for the maintainer
# to wire to their provider/CLI of choice (the harness is model-agnostic).

name: Refresh field-pulse

on:
  workflow_dispatch: {}      # manual: Actions tab → Run workflow
  # schedule:
  #   - cron: "0 9 1 * *"    # 09:00 UTC on the 1st of each month

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Refresh each domain's field-pulse
        env:
          MODEL_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          # For each domains/*/field-pulse.md, ask your model to run an Expert-layer sweep
          # (protocol/expert-layer.md): search the live field, curate by that field's epistemics,
          # and rewrite field-pulse.md with a fresh dated snapshot + source list.
          #
          # Wire this to your provider. Examples (pick one, then remove this comment):
          #   - Anthropic API via a small script using $MODEL_API_KEY
          #   - An agent CLI (Claude Code / OpenCode / Aider) in headless mode, pointed at
          #     protocol/expert-layer.md with the field-pulse.md as the target file
          echo "TODO: maintainer wires the AI sweep here (see protocol/expert-layer.md)."
          echo "Until then this is a no-op so the workflow stays green."

      - name: Open a PR with any updates
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore(expert): scheduled field-pulse refresh"
          title: "Expert layer: scheduled field-pulse refresh"
          body: |
            Automated currency sweep. Review the diff against `protocol/expert-layer.md`'s
            epistemics bar before merging — tell canon from frontier from hype.
          branch: expert/field-pulse-refresh
          delete-branch: true
